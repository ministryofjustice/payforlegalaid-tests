apiVersion: v1
kind: Pod
metadata:
  name: 'gpfd-at-tests'
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: gpfd-tests
      image: ${TEST_IMAGE}
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: [ "ALL" ]
      env:
        - name: GPFD_URL
          value: https://${GPFD_URL}
        - name: SPRING_PROFILES_ACTIVE
          value: ${ENV_NAME}
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: client-secret-${ENV_NAME}
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: client-id-${ENV_NAME}
        - name: AZURE_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: tenant-id-${ENV_NAME}
        - name: MOJFIN_DEV_READ_USERNAME
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: mojfin-dev-read-username
        - name: MOJFIN_DEV_READ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: mojfin-dev-read-password
        - name: MOJFIN_DEV_WRITE_USERNAME
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: mojfin-dev-write-username
        - name: MOJFIN_DEV_WRITE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: mojfin-dev-write-password
        - name: MOJFIN_DB_URL
          valueFrom:
            secretKeyRef:
              name: ${SECRET_NAME}
              key: mojfin-db-url